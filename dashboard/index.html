<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Career Risk Analytics</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%234a6fa5'/%3E%3Cpath d='M8 22h16v3H8zm2-4 4-6 4 3 4-7 2 2-5 10-4-3-3 5z' fill='white'/%3E%3C/svg%3E">
  <style>
    :root {
      --ink: #1f2937;
      --muted: #667085;
      --line: #d0d5dd;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --red: #c9514a;
      --green: #2f7f6f;
      --blue: #4a6fa5;
      --amber: #b7791f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      padding: 24px 32px 18px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: 0;
    }
    .subtitle { color: var(--muted); margin: 0; line-height: 1.55; }
    main {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 20px;
      padding: 20px 32px 32px;
    }
    nav {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      height: fit-content;
      position: sticky;
      top: 16px;
    }
    nav button {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--ink);
      text-align: left;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    nav button.active { background: #e9eef6; color: #23436b; font-weight: 700; }
    section {
      display: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      min-height: 560px;
    }
    section.active { display: block; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfd;
    }
    .metric b { display: block; font-size: 24px; margin-bottom: 4px; }
    .metric span { color: var(--muted); font-size: 13px; }
    .chart-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
    }
    .chart-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      overflow: hidden;
    }
    .bar {
      display: grid;
      grid-template-columns: 170px 1fr 54px;
      align-items: center;
      gap: 10px;
      margin: 9px 0;
      font-size: 13px;
    }
    .track { height: 12px; background: #edf0f3; border-radius: 999px; overflow: hidden; }
    .fill { height: 100%; border-radius: 999px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 13px;
    }
    th, td { border-bottom: 1px solid var(--line); padding: 9px; text-align: left; vertical-align: top; }
    th { background: #f2f4f7; }
    .form {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      margin: 12px 0 18px;
    }
    input, select {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
      background: white;
    }
    .run {
      border: 0;
      background: var(--blue);
      color: white;
      border-radius: 6px;
      padding: 0 18px;
      cursor: pointer;
      font-weight: 700;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; padding: 16px; }
      nav { position: static; }
      .grid, .chart-row, .form { grid-template-columns: 1fr; }
      .bar { grid-template-columns: 120px 1fr 46px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>AI时代大学生就业竞争力分析与职业风险预测系统</h1>
    <p class="subtitle">数据分析 + 风控思维 + 数学统计 + AI时代职业热点。默认读取 pipeline 生成的 dashboard_data.json。</p>
  </header>
  <main>
    <nav>
      <button class="active" data-page="map">未来就业地图</button>
      <button data-page="skills">技能价值排名</button>
      <button data-page="sim">个人职业模拟器</button>
    </nav>
    <div>
      <section id="map" class="active">
        <div class="grid">
          <div class="metric"><b id="avgRisk">--</b><span>平均AI风险</span></div>
          <div class="metric"><b id="safeJobs">--</b><span>低风险职业数</span></div>
          <div class="metric"><b id="highDemand">--</b><span>高需求职业数</span></div>
        </div>
        <div class="chart-row">
          <div class="chart-box">
            <h3>高风险职业</h3>
            <div id="riskBars"></div>
          </div>
          <div class="chart-box">
            <h3>AI安全/高需求职业</h3>
            <div id="demandBars"></div>
          </div>
        </div>
        <table id="careerTable"></table>
      </section>
      <section id="skills">
        <div class="chart-box">
          <h3>2026技能价值增长</h3>
          <div id="skillBars"></div>
        </div>
        <table id="skillTable"></table>
      </section>
      <section id="sim">
        <div class="form">
          <select id="major">
            <option>Mathematics</option>
            <option>Statistics</option>
            <option>Computer Science</option>
            <option>Finance</option>
            <option>Business</option>
          </select>
          <input id="skillsInput" value="SQL, Python" />
          <button class="run" id="runSim">运行模拟</button>
        </div>
        <table id="simTable"></table>
      </section>
    </div>
  </main>
  <script>
    const pages = document.querySelectorAll("nav button");
    pages.forEach(btn => btn.addEventListener("click", () => {
      pages.forEach(item => item.classList.remove("active"));
      document.querySelectorAll("section").forEach(item => item.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.page).classList.add("active");
    }));

    function bar(container, rows, valueKey, color, suffix = "") {
      container.innerHTML = rows.map(row => {
        const value = Number(row[valueKey]).toFixed(1);
        const width = Math.max(4, Math.min(100, Number(row[valueKey])));
        return `<div class="bar"><span>${row.occupation || row.skill}</span><div class="track"><div class="fill" style="width:${width}%;background:${color}"></div></div><strong>${value}${suffix}</strong></div>`;
      }).join("");
    }

    function table(el, columns, rows) {
      el.innerHTML = `<thead><tr>${columns.map(c => `<th>${c.label}</th>`).join("")}</tr></thead><tbody>${rows.map(row => `<tr>${columns.map(c => `<td>${row[c.key] ?? ""}</td>`).join("")}</tr>`).join("")}</tbody>`;
    }

    async function load() {
      const response = await fetch("dashboard_data.json");
      const data = await response.json();
      const careers = data.career_scores;
      const skills = data.skill_rankings;
      const avg = careers.reduce((sum, row) => sum + row.ai_risk_score, 0) / careers.length;
      document.getElementById("avgRisk").textContent = `${avg.toFixed(1)}%`;
      document.getElementById("safeJobs").textContent = careers.filter(row => row.risk_band === "Low").length;
      document.getElementById("highDemand").textContent = careers.filter(row => row.future_demand_score >= 75).length;
      bar(document.getElementById("riskBars"), [...careers].sort((a, b) => b.ai_risk_score - a.ai_risk_score).slice(0, 8), "ai_risk_score", "#c9514a", "%");
      bar(document.getElementById("demandBars"), [...careers].sort((a, b) => b.future_demand_score - a.future_demand_score).slice(0, 8), "future_demand_score", "#2f7f6f", "%");
      table(document.getElementById("careerTable"), [
        {key: "occupation", label: "职业"},
        {key: "ai_risk_score", label: "AI风险"},
        {key: "future_demand_score", label: "未来需求"},
        {key: "risk_band", label: "风险等级"},
        {key: "salary_growth_pct", label: "薪资增长"}
      ], careers);
      bar(document.getElementById("skillBars"), skills.slice(0, 12), "salary_growth_pct", "#4a6fa5", "%");
      table(document.getElementById("skillTable"), [
        {key: "skill", label: "技能"},
        {key: "salary_growth_pct", label: "薪资增长"},
        {key: "last_salary_usd", label: "最新平均薪资"},
        {key: "posting_count", label: "岗位提及"}
      ], skills.slice(0, 20));
      renderSim(data.student_simulator_demo);
      document.getElementById("runSim").addEventListener("click", () => renderSim(data.student_simulator_demo));
    }

    function renderSim(rows) {
      table(document.getElementById("simTable"), [
        {key: "occupation", label: "推荐职业"},
        {key: "student_fit_score", label: "匹配分"},
        {key: "ai_risk_score", label: "AI风险"},
        {key: "future_demand_score", label: "未来需求"},
        {key: "recommended_skills", label: "建议补齐技能"}
      ], rows);
    }

    load().catch(err => {
      document.body.insertAdjacentHTML("beforeend", `<pre style="padding:16px;color:#c9514a">请先运行：python scripts/run_pipeline.py\n${err}</pre>`);
    });
  </script>
</body>
</html>
